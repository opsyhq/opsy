name: GitHub Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
      - run: bun run typecheck
      - run: bun run build
      - run: bun run test

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
