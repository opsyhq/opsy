name: OSS CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: bun install
      - run: bun run typecheck
      - run: bun run build
      - run: bun run test
      - run: bun run pack:check
      - run: bun run docs:check
      - run: bun run smoke
